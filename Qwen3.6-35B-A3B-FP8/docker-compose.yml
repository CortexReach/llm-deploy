# Qwen3.6-35B-A3B-FP8 — vLLM OpenAI-compatible serving example.
# Hardware: 4x RTX 4090 24GB (Ada sm_89, native FP8). TP=4, FP8 KV cache.
# Multimodal enabled. MTP speculative decoding enabled.

name: qwen36

services:
  vllm:
    image: vllm/vllm-openai:v0.20.0
    container_name: vllm-qwen36
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${MODEL_PATH:-/path/to/Qwen3.6-35B-A3B-FP8}:/model:ro
      - vllm-cache:/root/.cache
    ipc: host
    shm_size: '16g'
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      # offline / privacy
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - DO_NOT_TRACK=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_DO_NOT_TRACK=1
      - VLLM_LOGGING_LEVEL=INFO
      # NCCL tuning for consumer 4090 (no working P2P over PCIe; no IB on this host)
      - NCCL_P2P_DISABLE=1
      - NCCL_IB_DISABLE=1
      - NCCL_SHM_DISABLE=0
      # GPU ordering & threading
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - NVIDIA_VISIBLE_DEVICES=all
      - OMP_NUM_THREADS=8
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 900s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    command: >
      --model /model
      --served-model-name qwen3 qwen3.6 qwen36
      --tensor-parallel-size 4
      --enable-chunked-prefill
      --enable-prefix-caching
      --max-model-len 131072
      --max-num-seqs 24
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.90
      --kv-cache-dtype fp8
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --mm-encoder-tp-mode data
      --mm-processor-cache-type shm
      --limit-mm-per-prompt '{"image":4,"video":1}'
      --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
      --trust-remote-code
      --host 0.0.0.0
      --port 8000

volumes:
  vllm-cache:
    name: vllm-qwen36-cache
